backend:
  name: git-gateway
  repo: ojitomo78/ojitomo78.github.io
  branch: master

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "blog"
    label: "Entradas del Blog"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    # 🌟 CONFIGURACIÓN DEL FORMATO DE FECHA (Formato YYYY-MM-DD)
    date_format: "YYYY-MM-DD"
    time_format: false
    format: "yaml-frontmatter"
    fields:
      # 1. Título (Igual a como lo hacías)
      - { label: "Título", name: "title", widget: "string" }
      
      # 2. Separador de extracto (Inyectado automáticamente oculto para que no te estorbe)
      - { label: "Excerpt Separator", name: "excerpt_separator", widget: "hidden", default: "<!--more-->" }
      
      # 3. Fecha (Configurada para que solo guarde la fecha sin la zona horaria larga si no la quieres)
      - { label: "Fecha", name: "date", widget: "date", format: "YYYY-MM-DD" }
      
      # 4. Categorías y Etiquetas
      - { label: "Categorías", name: "categories", widget: "list", default: ["Reseñas"] }
      - { label: "Etiquetas (Tags)", name: "tags", widget: "list" }
      
      # 5. Imagen Destacada (Corregido a "teaser" dentro del objeto header)
      - label: "Configuración del Header"
        name: "header"
        widget: "object"
        fields:
          - { label: "Imagen Teaser (Miniatura)", name: "teaser", widget: "image", required: false }
      
      # 6. Extracto / Resumen corto
      - { label: "Descripción / Excerpt", name: "excerpt", widget: "text", required: false }
      
      # 7. El cuerpo del post
      - { label: "Cuerpo del Post", name: "body", widget: "markdown" }
