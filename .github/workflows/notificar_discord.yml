name: Notificar Nuevo Post en Discord

on:
  push:
    branches:
      - master
    paths:
      - '_posts/**'

jobs:
  discord_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extraer datos del ├║ltimo post
        id: post_data
        run: |
          # Buscar el archivo .md modificado o a├▒adido en _posts
          FILE=$(git diff --name-only HEAD~1 HEAD | grep '^_posts/' | head -n 1)
          
          # Si no hay archivo v├ílido, terminar pac├¡ficamente
          if [ -z "$FILE" ]; then
            echo "No se encontraron posts nuevos."
            exit 0
          fi

          # Extraer los metadatos limpiando comillas simples y espacios en las puntas
          TITLE=$(grep '^title:' "$FILE" | head -n 1 | sed 's/^title:[[:space:]]*//' | sed "s/^'//;s/'$//;s/^\"//;s/\"$//")
          EXCERPT=$(grep '^excerpt:' "$FILE" | head -n 1 | sed 's/^excerpt:[[:space:]]*//' | sed "s/^'//;s/'$//;s/^\"//;s/\"$//")
          TEASER=$(grep 'teaser:' "$FILE" | head -n 1 | sed 's/.*teaser:[[:space:]]*//' | sed "s/^'//;s/'$//;s/^\"//;s/\"$//")
          
          # Si el teaser es una ruta relativa, le sumamos tu dominio
          if [[ "$TEASER" == /* ]]; then
            TEASER="https://ojitomo78.github.io$TEASER"
          fi

          # Generar el slug de la URL bas├índonos en el nombre del archivo
          SLUG=$(basename "$FILE" .md | cut -d'-' -f4-)
          URL="https://ojitomo78.github.io/posts/$SLUG/"

          # Guardar las variables escapando cualquier problema de saltos de l├¡nea
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "excerpt=$EXCERPT" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "teaser=$TEASER" >> $GITHUB_OUTPUT

      - name: Enviar a Discord v├¡a cURL
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # Construimos el JSON exacto que Discord espera recibir
          # Color 11276051 es un tono rojo oscuro similar al de tu imagen
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "content": "|| @everyone || ­ƒôó **Villa** ha publicado un nuevo Post en: '"${{ steps.post_data.outputs.url }}"'",
                 "embeds": [
                   {
                     "title": "'"${{ steps.post_data.outputs.title }}"'",
                     "description": "'"${{ steps.post_data.outputs.excerpt }}"'",
                     "url": "'"${{ steps.post_data.outputs.url }}"'",
                     "color": 11276051,
                     "thumbnail": {
                       "url": "'"${{ steps.post_data.outputs.teaser }}"'"
                     }
                   }
                 ]
               }' $WEBHOOK_URL
