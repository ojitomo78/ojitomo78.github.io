name: Notificar Nuevo Post en Discord

on:
  push:
    branches:
      - master
    paths:
      - '_posts/**'

jobs:
  discord_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ⏳ EL FRENO DE MANO: Espera a que GitHub Pages termine de compilar
      - name: Esperar a que la página esté en vivo
        run: |
          echo "Esperando 120 segundos para asegurar que GitHub Pages compile el sitio..."
          sleep 120

      - name: Extraer datos del último post
        id: post_data
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD | grep '^_posts/' | head -n 1)
          
          if [ -z "$FILE" ]; then
            echo "No se encontraron posts nuevos."
            exit 0
          fi

          TITLE=$(grep '^title:' "$FILE" | head -n 1 | sed 's/^title:[[:space:]]*//' | sed "s/^'//;s/'$//;s/^\"//;s/\"$//")
          EXCERPT=$(grep '^excerpt:' "$FILE" | head -n 1 | sed 's/^excerpt:[[:space:]]*//' | sed "s/^'//;s/'$//;s/^\"//;s/\"$//")
          TEASER=$(grep 'teaser:' "$FILE" | head -n 1 | sed 's/.*teaser:[[:space:]]*//' | sed "s/^'//;s/'$//;s/^\"//;s/\"$//")
          
          if [[ "$TEASER" == /* ]]; then
            TEASER="https://ojitomo78.github.io$TEASER"
          fi

          SLUG=$(basename "$FILE" .md | cut -d'-' -f4-)
          URL="https://ojitomo78.github.io/posts/$SLUG/"

          RANDOM_COLOR=$((RANDOM % 16777216))

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "excerpt=$EXCERPT" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "teaser=$TEASER" >> $GITHUB_OUTPUT
          echo "color=$RANDOM_COLOR" >> $GITHUB_OUTPUT

      - name: Enviar a Discord vía cURL
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "content": "|| @everyone || 📢 **Villa** ha publicado un nuevo Post en: '"${{ steps.post_data.outputs.url }}"'",
                 "embeds": [
                   {
                     "title": "'"${{ steps.post_data.outputs.title }}"'",
                     "description": "'"${{ steps.post_data.outputs.excerpt }}"'",
                     "url": "'"${{ steps.post_data.outputs.url }}"'",
                     "color": '"${{ steps.post_data.outputs.color }}"',
                     "thumbnail": {
                       "url": "'"${{ steps.post_data.outputs.teaser }}"'"
                     }
                   }
                 ]
               }' $WEBHOOK_URL
